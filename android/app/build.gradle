plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0.0"

android {
    namespace "com.windowsmediacenter.app"
    compileSdk 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        // Windows Media Center for Android
        applicationId "com.windowsmediacenter.app"
        // Android 7.0+ covers the vast majority of active devices while still
        // allowing the retro Aero Glass UI to run smoothly via BackdropFilter.
        minSdk 24
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            // Signed with the debug keystore so `flutter build apk --release`
            // and CI both produce an installable APK with no extra signing
            // secrets required. Replace with your own signing config before
            // publishing to the Play Store.
            signingConfig signingConfigs.debug
            // Code shrinking is left OFF by default. This project cannot be
            // test-installed on a real device before being handed to you, and
            // R8 stripping occasionally removes reflection-based code paths
            // used by some plugins (e.g. media playback) in ways that only
            // surface at runtime, not at build time. Once you've verified the
            // app runs correctly for your use case, flip these to `true` and
            // add any required keep rules to proguard-rules.pro.
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "androidx.core:core-ktx:1.13.1"
}
